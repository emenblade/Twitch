<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Media Player</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: transparent; overflow: hidden; }

    #wrap {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity 0.35s ease;
    }
    #wrap.visible { opacity: 1; }

    /* Video container with cyberpunk frame */
    #vid-wrap {
      position: relative;
      max-width: 100%; max-height: 100%;
      display: flex; align-items: center; justify-content: center;
    }
    #vid-wrap::before {
      content: '';
      position: absolute; inset: -3px;
      border: 1px solid rgba(123,47,255,0.5);
      border-radius: 4px;
      pointer-events: none;
      z-index: 1;
    }
    video#player {
      max-width: 100%; max-height: 100%;
      display: block; border-radius: 2px;
    }
    audio#aplayer { display: none; }
  </style>
</head>
<body>
<div id="wrap">
  <div id="vid-wrap">
    <video id="player" playsinline></video>
    <audio id="aplayer"></audio>
  </div>
</div>

<script>
const wrap    = document.getElementById('wrap');
const player  = document.getElementById('player');
const aplayer = document.getElementById('aplayer');

function playMedia(file, fileType) {
  const url = '/media/' + file + '?t=' + Date.now();
  if (fileType === 'video') {
    player.style.display = 'block';
    aplayer.src = '';
    player.src = url;
    wrap.classList.add('visible');
    player.play().catch(() => {});
    player.onended = () => {
      wrap.classList.remove('visible');
      setTimeout(() => { player.src = ''; }, 400);
    };
  } else {
    player.style.display = 'none';
    player.src = '';
    aplayer.src = url;
    wrap.classList.add('visible');
    aplayer.play().catch(() => {});
    aplayer.onended = () => {
      wrap.classList.remove('visible');
      setTimeout(() => { aplayer.src = ''; }, 400);
    };
  }
}

function connect() {
  const ws = new WebSocket('ws://' + location.host + '/media-ws');
  ws.onmessage = (e) => {
    try {
      const msg = JSON.parse(e.data);
      if (msg.type === 'play_media') playMedia(msg.file, msg.fileType);
    } catch {}
  };
  ws.onclose = () => setTimeout(connect, 5000);
  ws.onerror = () => ws.close();
}

connect();
</script>
</body>
</html>
