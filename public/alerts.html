<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Alerts</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 1920px;
      height: 300px;
      overflow: hidden;
      background: transparent;
    }

    #alert-wrap {
      position: absolute;
      bottom: 24px;
      right: 48px;
      width: 620px;
    }

    /* ── Alert panel ─────────────────────────────────────────────── */
    .alert {
      position: relative;
      background: linear-gradient(135deg, rgba(13,0,26,0.97) 0%, rgba(26,0,51,0.97) 60%, rgba(45,0,80,0.97) 100%);
      border: 1px solid var(--accent);
      border-left: 4px solid var(--accent);
      border-radius: 6px;
      padding: 18px 22px 18px 22px;
      display: flex;
      align-items: center;
      gap: 18px;
      transform: translateX(110%);
      opacity: 0;
      box-shadow:
        0 0 0 1px rgba(0,0,0,0.8),
        0 0 25px -5px var(--accent),
        inset 0 0 30px rgba(0,0,0,0.5);
      overflow: hidden;
    }

    /* Scan-line overlay */
    .alert::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0, 0, 0, 0.12) 2px,
        rgba(0, 0, 0, 0.12) 4px
      );
      pointer-events: none;
      z-index: 1;
    }

    /* Top-right corner bracket */
    .alert::after {
      content: '';
      position: absolute;
      top: 6px; right: 6px;
      width: 12px; height: 12px;
      border-top: 2px solid var(--accent);
      border-right: 2px solid var(--accent);
      opacity: 0.7;
    }

    /* Bottom-left corner bracket */
    .corner-bl {
      position: absolute;
      bottom: 6px; left: 6px;
      width: 12px; height: 12px;
      border-bottom: 2px solid var(--accent);
      border-left: 2px solid var(--accent);
      opacity: 0.7;
    }

    /* ── Animations ──────────────────────────────────────────────── */
    @keyframes slideIn {
      0%   { transform: translateX(110%); opacity: 0; }
      60%  { transform: translateX(-8px); opacity: 1; }
      80%  { transform: translateX(4px); }
      100% { transform: translateX(0); opacity: 1; }
    }

    @keyframes slideOut {
      0%   { transform: translateX(0); opacity: 1; }
      20%  { transform: translateX(-10px); opacity: 1; }
      100% { transform: translateX(110%); opacity: 0; }
    }

    @keyframes glitchText {
      0%, 88%, 100% { clip-path: none; transform: none; color: #ffffff; }
      89% { clip-path: polygon(0 15%, 100% 15%, 100% 38%, 0 38%); transform: translateX(-5px); color: var(--accent); }
      90% { clip-path: polygon(0 55%, 100% 55%, 100% 75%, 0 75%); transform: translateX(5px); }
      91% { clip-path: polygon(0 5%,  100% 5%,  100% 25%, 0 25%); transform: translateX(-3px); }
      92% { clip-path: none; transform: translateX(2px); }
      93% { clip-path: polygon(0 70%, 100% 70%, 100% 90%, 0 90%); transform: translateX(-2px); color: #ff2d78; }
      94% { clip-path: none; transform: none; color: #ffffff; }
    }

    @keyframes borderPulse {
      0%, 100% { box-shadow: 0 0 0 1px rgba(0,0,0,0.8), 0 0 25px -5px var(--accent), inset 0 0 30px rgba(0,0,0,0.5); }
      50%       { box-shadow: 0 0 0 1px rgba(0,0,0,0.8), 0 0 40px -2px var(--accent), inset 0 0 30px rgba(0,0,0,0.5); }
    }

    @keyframes iconGlow {
      0%, 100% { filter: drop-shadow(0 0 6px var(--accent)); }
      50%       { filter: drop-shadow(0 0 14px var(--accent)) brightness(1.3); }
    }

    .alert.show {
      animation:
        slideIn 0.45s cubic-bezier(0.16, 1, 0.3, 1) forwards,
        borderPulse 2s ease-in-out 0.5s infinite;
    }

    .alert.hide {
      animation: slideOut 0.4s ease-in forwards;
    }

    /* ── Content ─────────────────────────────────────────────────── */
    .icon {
      font-size: 32px;
      line-height: 1;
      flex-shrink: 0;
      animation: iconGlow 2s ease-in-out 0.5s infinite;
      z-index: 2;
    }

    .content {
      flex: 1;
      min-width: 0;
      z-index: 2;
    }

    .label {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--accent);
      text-shadow: 0 0 10px var(--accent);
      margin-bottom: 5px;
    }

    .user {
      font-family: 'Orbitron', sans-serif;
      font-size: 22px;
      font-weight: 900;
      color: #ffffff;
      text-shadow: 0 0 12px rgba(255,255,255,0.4);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      animation: glitchText 6s infinite;
    }

    .detail {
      font-family: 'Share Tech Mono', monospace;
      font-size: 12px;
      color: #c9a0dc;
      margin-top: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      opacity: 0.9;
    }

    /* Tier badge */
    .badge {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      letter-spacing: 1px;
      padding: 2px 8px;
      border: 1px solid var(--accent);
      border-radius: 3px;
      color: var(--accent);
      margin-left: 8px;
      vertical-align: middle;
      opacity: 0.8;
    }

    /* ── Type colours ─────────────────────────────────────────────── */
    .alert[data-type="follow"]  { --accent: #00f5ff; }
    .alert[data-type="sub"]     { --accent: #bf00ff; }
    .alert[data-type="resub"]   { --accent: #9d00ff; }
    .alert[data-type="giftsub"] { --accent: #ff2d78; }
    .alert[data-type="bits"]    { --accent: #ffd700; }
    .alert[data-type="raid"]    { --accent: #ff6b35; }
  </style>
</head>
<body>
<div id="alert-wrap"></div>

<script>
const DURATION = 7500;

const ICONS = {
  follow:  '👤',
  sub:     '⭐',
  resub:   '🌟',
  giftsub: '🎁',
  bits:    '💎',
  raid:    '⚡',
};

const LABELS = {
  follow:  'NEW FOLLOWER',
  sub:     'NEW SUBSCRIBER',
  resub:   'RESUBSCRIBED',
  giftsub: 'GIFT SUBSCRIPTIONS',
  bits:    'BITS',
  raid:    'INCOMING RAID',
};

let queue   = [];
let showing = false;

function escHtml(s) {
  return String(s ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function buildDetail(data) {
  const parts = [];

  if (data.tier && ['sub','resub','giftsub'].includes(data.type)) {
    parts.push(`<span class="badge">${escHtml(data.tier)}</span>`);
  }
  if (data.type === 'resub' && data.months)   parts.push(`${escHtml(data.months)} months`);
  if (data.type === 'giftsub' && data.count)  parts.push(`${escHtml(data.count)} gift sub${data.count > 1 ? 's' : ''}`);
  if (data.type === 'bits' && data.bits)      parts.push(`${Number(data.bits).toLocaleString()} bits`);
  if (data.type === 'raid' && data.viewers != null) parts.push(`${Number(data.viewers).toLocaleString()} viewers`);

  if (data.message && ['resub','bits'].includes(data.type) && data.message.trim()) {
    parts.push(`"${escHtml(data.message.trim())}"`);
  }

  return parts.join(' &nbsp;·&nbsp; ');
}

function buildAlert(data) {
  const el = document.createElement('div');
  el.className  = 'alert';
  el.dataset.type = data.type;

  const detail = buildDetail(data);

  el.innerHTML = `
    <div class="corner-bl"></div>
    <div class="icon">${ICONS[data.type] ?? '🔔'}</div>
    <div class="content">
      <div class="label">${LABELS[data.type] ?? 'ALERT'}</div>
      <div class="user">${escHtml(data.user)}</div>
      ${detail ? `<div class="detail">${detail}</div>` : ''}
    </div>
  `;
  return el;
}

function showNext() {
  if (!queue.length) { showing = false; return; }
  showing = true;

  const data = queue.shift();
  const wrap = document.getElementById('alert-wrap');
  const el   = buildAlert(data);
  wrap.appendChild(el);

  // Double rAF ensures the initial transform is painted before we add 'show'
  requestAnimationFrame(() => requestAnimationFrame(() => el.classList.add('show')));

  setTimeout(() => {
    el.classList.remove('show');
    el.classList.add('hide');
    el.addEventListener('animationend', () => { el.remove(); showNext(); }, { once: true });
  }, DURATION);
}

function queueAlert(data) {
  playSound(data.type);
  queue.push(data);
  if (!showing) showNext();
}

// ── Custom sounds ──────────────────────────────────────────────────
let customSounds = {};

async function loadCustomSounds() {
  try { customSounds = await fetch('/sounds').then(r => r.json()); } catch {}
}

// ── Sound engine ──────────────────────────────────────────────────
let audioCtx = null;

function ac() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

// OBS Browser Sources block autoplay — resume on any interaction
document.addEventListener('click', () => ac(), { once: true });

function distortCurve(amt) {
  const n = 512, cv = new Float32Array(n);
  for (let i = 0; i < n; i++) { const x = (i*2)/n-1; cv[i] = (Math.PI+amt)*x/(Math.PI+amt*Math.abs(x)); }
  return cv;
}
function mkDist(c, amt) {
  const ws = c.createWaveShaper(); ws.curve = distortCurve(amt); ws.oversample = '4x'; return ws;
}
function mkLimiter(c) {
  const comp = c.createDynamicsCompressor();
  comp.threshold.value=-3; comp.knee.value=0; comp.ratio.value=20; comp.attack.value=0.001; comp.release.value=0.1;
  comp.connect(c.destination); return comp;
}
function note(c, freq, t, dur, vol, out) {
  [-8, 0, 8].forEach(cents => {
    const osc = c.createOscillator(), filt = c.createBiquadFilter(), ds = mkDist(c, 18), g = c.createGain();
    osc.type = 'sawtooth';
    osc.frequency.value = freq * Math.pow(2, cents / 1200);
    filt.type = 'lowpass';
    filt.frequency.setValueAtTime(freq * 1.5, t);
    filt.frequency.exponentialRampToValueAtTime(freq * 10, t + 0.06);
    filt.frequency.exponentialRampToValueAtTime(freq * 2.5, t + dur * 0.65);
    filt.Q.value = 5;
    g.gain.setValueAtTime(0.001, t);
    g.gain.linearRampToValueAtTime(vol / 3, t + 0.018);
    g.gain.setValueAtTime(vol / 3, t + dur * 0.55);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    osc.connect(filt); filt.connect(ds); ds.connect(g); g.connect(out);
    osc.start(t); osc.stop(t + dur + 0.05);
  });
}
function subHit(c, t, out) {
  const osc = c.createOscillator(), g = c.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(100, t);
  osc.frequency.exponentialRampToValueAtTime(35, t + 0.45);
  g.gain.setValueAtTime(0.001, t);
  g.gain.linearRampToValueAtTime(0.75, t + 0.014);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.55);
  osc.connect(g); g.connect(out);
  osc.start(t); osc.stop(t + 0.6);
}

function playSound(type) {
  if (customSounds[type]) {
    new Audio('/sounds/' + type + '?t=' + Date.now()).play().catch(() => {});
    return;
  }
  try {
    const c = ac(), t = c.currentTime, out = mkLimiter(c);
    switch (type) {
      case 'follow':
        note(c, 110,   t,        1.0, 0.28, out);
        note(c, 164.8, t + 0.18, 0.9, 0.28, out);
        note(c, 220,   t + 0.36, 1.4, 0.32, out);
        break;
      case 'sub':
        subHit(c, t, out);
        note(c, 82.4,  t + 0.08, 1.1, 0.30, out);
        note(c, 123.5, t + 0.35, 1.0, 0.30, out);
        note(c, 164.8, t + 0.60, 2.2, 0.36, out);
        break;
      case 'resub':
        note(c, 110,   t,        2.4, 0.22, out);
        note(c, 130.8, t + 0.16, 2.2, 0.22, out);
        note(c, 164.8, t + 0.32, 2.0, 0.24, out);
        note(c, 220,   t + 0.48, 2.2, 0.28, out);
        break;
      case 'giftsub':
        note(c, 110,   t,        0.5, 0.24, out);
        note(c, 146.8, t + 0.12, 0.5, 0.24, out);
        note(c, 164.8, t + 0.24, 0.5, 0.24, out);
        note(c, 196,   t + 0.36, 0.5, 0.26, out);
        note(c, 220,   t + 0.48, 1.8, 0.32, out);
        subHit(c, t + 0.48, out);
        break;
      case 'bits':
        note(c, 220,   t,        0.18, 0.30, out);
        note(c, 220,   t + 0.22, 0.18, 0.28, out);
        note(c, 196,   t + 0.40, 0.20, 0.26, out);
        note(c, 220,   t + 0.56, 1.4,  0.32, out);
        note(c, 110,   t + 0.56, 1.0,  0.16, out);
        break;
      case 'raid':
        subHit(c, t, out);
        note(c, 82.4,  t + 0.05, 0.65, 0.26, out);
        note(c, 123.5, t + 0.32, 0.65, 0.28, out);
        note(c, 82.4,  t + 0.68, 0.65, 0.32, out);
        note(c, 123.5, t + 0.95, 0.65, 0.34, out);
        subHit(c, t + 1.28, out);
        note(c, 164.8, t + 1.33, 2.8,  0.40, out);
        break;
    }
  } catch (e) { console.warn('Audio error:', e); }
}

// ── WebSocket connection to server ────────────────────────────────
function connect() {
  const ws = new WebSocket(`ws://${location.host}/ws`);
  ws.onmessage = (e) => { try { queueAlert(JSON.parse(e.data)); } catch {} };
  ws.onclose   = () => setTimeout(connect, 3000);
  ws.onerror   = () => ws.close();
}

loadCustomSounds().then(() => { setInterval(loadCustomSounds, 60000); });
connect();

// ── Uncomment to preview without a live stream ────────────────────
// setTimeout(() => queueAlert({ type: 'follow',  user: 'CyberPilot99' }), 500);
// setTimeout(() => queueAlert({ type: 'sub',     user: 'NeonRider',    tier: 'Tier 1' }), 3000);
// setTimeout(() => queueAlert({ type: 'resub',   user: 'VoidWalker',   tier: 'Tier 2', months: 7, message: 'Love the stream!' }), 8000);
// setTimeout(() => queueAlert({ type: 'giftsub', user: 'DataGhost',    tier: 'Tier 1', count: 5 }), 13500);
// setTimeout(() => queueAlert({ type: 'bits',    user: 'ChromeFox',    bits: 1000, message: 'PogChamp' }), 19000);
// setTimeout(() => queueAlert({ type: 'raid',    user: 'PixelWarden',  viewers: 47 }), 25000);
</script>
</body>
</html>
