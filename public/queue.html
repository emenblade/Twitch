<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Queue</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 300px;
      background: transparent;
      overflow: hidden;
    }

    #queue-panel {
      width: 300px;
      background: linear-gradient(160deg, rgba(13,0,26,0.97) 0%, rgba(26,0,51,0.97) 60%, rgba(50,0,90,0.97) 100%);
      border: 1px solid rgba(145,70,255,0.3);
      border-left: 2px solid rgba(145,70,255,0.5);
      border-radius: 6px;
      overflow: hidden;
      position: relative;
    }

    /* Scan-line overlay */
    #queue-panel::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0, 0, 0, 0.1) 2px,
        rgba(0, 0, 0, 0.1) 4px
      );
      pointer-events: none;
      z-index: 1;
    }

    /* Top-right corner bracket */
    #queue-panel::after {
      content: '';
      position: absolute;
      top: 6px; right: 6px;
      width: 10px; height: 10px;
      border-top: 1px solid rgba(145,70,255,0.45);
      border-right: 1px solid rgba(145,70,255,0.45);
    }

    .panel-header {
      padding: 10px 14px 8px;
      position: relative;
      z-index: 2;
      border-bottom: 1px solid rgba(145,70,255,0.2);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .panel-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 11px;
      letter-spacing: 4px;
      color: #9146ff;
      text-shadow: 0 0 10px rgba(145,70,255,0.5);
      text-transform: uppercase;
    }

    .queue-count {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      color: #7b2fff;
      letter-spacing: 1px;
    }

    .queue-list {
      position: relative;
      z-index: 2;
      padding: 6px 0;
    }

    .queue-entry {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 7px 14px;
      border-bottom: 1px solid rgba(61,0,128,0.4);
      transition: background 0.15s;
    }

    .queue-entry:last-child {
      border-bottom: none;
    }

    .entry-num {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      color: #7b2fff;
      flex-shrink: 0;
      min-width: 20px;
      font-variant-numeric: tabular-nums;
    }

    .entry-name {
      font-family: 'Share Tech Mono', monospace;
      font-size: 13px;
      color: #e0c3ff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }

    .entry-name:first-of-type {
      color: #ffffff;
    }

    .queue-entry:first-child .entry-name {
      color: #00f5ff;
      text-shadow: 0 0 8px rgba(0,245,255,0.3);
    }

    .queue-entry:first-child .entry-num {
      color: #9146ff;
    }

    /* Bottom corner bracket */
    .corner-bl {
      position: absolute;
      bottom: 6px; left: 6px;
      width: 10px; height: 10px;
      border-bottom: 1px solid rgba(145,70,255,0.45);
      border-left: 1px solid rgba(145,70,255,0.45);
      z-index: 3;
    }
  </style>
</head>
<body>

<div id="queue-panel" style="display:none">
  <div class="panel-header">
    <span class="panel-title">⚡ Queue</span>
    <span class="queue-count" id="queue-count">0 waiting</span>
  </div>
  <div class="queue-list" id="queue-list"></div>
  <div class="corner-bl"></div>
</div>

<script>
const queuePanel = document.getElementById('queue-panel');
const queueList  = document.getElementById('queue-list');
const queueCount = document.getElementById('queue-count');

function renderQueue(q) {
  while (queueList.firstChild) queueList.removeChild(queueList.firstChild);

  if (!q || q.length === 0) {
    queuePanel.style.display = 'none';
    return;
  }

  queuePanel.style.display = 'block';
  queueCount.textContent = q.length + (q.length === 1 ? ' waiting' : ' waiting');

  q.forEach(function(entry, i) {
    var row = document.createElement('div');
    row.className = 'queue-entry';

    var num = document.createElement('span');
    num.className = 'entry-num';
    num.textContent = String(i + 1) + '.';

    var name = document.createElement('span');
    name.className = 'entry-name';
    name.textContent = entry.displayName || entry.username;

    row.appendChild(num);
    row.appendChild(name);
    queueList.appendChild(row);
  });
}

// ── WebSocket ──────────────────────────────────────────────────────
function connect() {
  var ws = new WebSocket('ws://' + location.host + '/queue-ws');

  ws.onmessage = function(e) {
    try {
      var m = JSON.parse(e.data);
      if (m.type === 'queue_update') renderQueue(m.queue);
    } catch {}
  };

  ws.onclose = function() { setTimeout(connect, 5000); };
  ws.onerror = function() { ws.close(); };
}

connect();
</script>
</body>
</html>
