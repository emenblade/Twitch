<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
      font-family: 'Share Tech Mono', monospace;
    }

    /* ── Outer panel (always visible) ────────────────────────────── */
    #chat-panel {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      background: rgba(13, 0, 26, 0.55);
      border: 1px solid rgba(123, 47, 255, 0.3);
      border-radius: 6px;
      overflow: hidden;
    }

    /* Top-right corner bracket */
    #chat-panel::after {
      content: '';
      position: absolute;
      top: 6px; right: 6px;
      width: 10px; height: 10px;
      border-top: 1px solid rgba(123, 47, 255, 0.5);
      border-right: 1px solid rgba(123, 47, 255, 0.5);
      pointer-events: none;
    }

    /* Bottom-left corner bracket */
    #chat-panel::before {
      content: '';
      position: absolute;
      bottom: 6px; left: 6px;
      width: 10px; height: 10px;
      border-bottom: 1px solid rgba(123, 47, 255, 0.5);
      border-left: 1px solid rgba(123, 47, 255, 0.5);
      pointer-events: none;
      z-index: 1;
    }

    /* ── Header ──────────────────────────────────────────────────── */
    #chat-header {
      flex-shrink: 0;
      padding: 7px 12px 6px;
      border-bottom: 1px solid rgba(123, 47, 255, 0.25);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #chat-header .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #7b2fff;
      box-shadow: 0 0 6px #7b2fff;
      flex-shrink: 0;
    }

    #chat-header .dot.live {
      background: #00ff88;
      box-shadow: 0 0 6px #00ff88;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    #chat-header span {
      font-family: 'Orbitron', sans-serif;
      font-size: 9px;
      letter-spacing: 3px;
      color: rgba(123, 47, 255, 0.7);
      text-transform: uppercase;
    }

    /* ── Messages area ───────────────────────────────────────────── */
    #chat {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      gap: 4px;
      padding: 8px 8px;
      overflow: hidden;
      min-height: 0;
    }

    /* ── Message ─────────────────────────────────────────────────── */
    .msg {
      display: flex;
      align-items: baseline;
      flex-wrap: wrap;
      gap: 4px;
      padding: 4px 8px 4px 7px;
      border-left: 2px solid var(--user-color, #7b2fff);
      background: rgba(13, 0, 26, 0.6);
      border-radius: 0 4px 4px 0;
      line-height: 1.5;
      animation: msgIn 0.2s ease-out forwards;
      opacity: 0;
      flex-shrink: 0;
    }

    .msg.fade-out {
      animation: msgOut 0.4s ease-in forwards;
    }

    @keyframes msgIn {
      from { opacity: 0; transform: translateX(-6px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    @keyframes msgOut {
      from { opacity: 1; }
      to   { opacity: 0; }
    }

    /* ── Badges ──────────────────────────────────────────────────── */
    .badges {
      display: inline-flex;
      gap: 3px;
      flex-shrink: 0;
      align-self: center;
    }

    .badge {
      font-size: 9px;
      letter-spacing: 1px;
      padding: 1px 5px;
      border-radius: 2px;
      font-weight: bold;
      border: 1px solid currentColor;
      line-height: 1.4;
    }

    .badge-broadcaster    { color: #ff2d78; }
    .badge-moderator      { color: #00ff88; }
    .badge-lead_moderator { color: #ff2d78; font-style: italic; }
    .badge-vip            { color: #bf00ff; }
    .badge-subscriber     { color: #7b2fff; }

    /* ── Name ────────────────────────────────────────────────────── */
    .name {
      font-size: 12px;
      font-weight: bold;
      color: var(--user-color, #bf00ff);
      text-shadow: 0 0 8px var(--user-color, #bf00ff);
      flex-shrink: 0;
      letter-spacing: 0.5px;
    }

    .colon {
      color: rgba(255,255,255,0.3);
      font-size: 12px;
      flex-shrink: 0;
    }

    /* ── Message text ────────────────────────────────────────────── */
    .text {
      font-size: 12px;
      color: #ddd0f0;
      word-break: break-word;
      min-width: 0;
      flex: 1;
    }

    .text img {
      height: 20px;
      width: auto;
      vertical-align: middle;
      margin: 0 1px;
    }
  </style>
</head>
<body>
<div id="chat-panel">
  <div id="chat-header">
    <div class="dot" id="status-dot"></div>
    <span>Live Chat</span>
  </div>
  <div id="chat"></div>
</div>

<script>
const MAX_MESSAGES = 20;

// Custom titles loaded from server at runtime — manage them at /setup
let CUSTOM_TITLES = {};

const FALLBACKS = [
  '#00f5ff','#bf00ff','#ff2d78','#9d00ff',
  '#00c8ff','#d44aff','#ff6b9d','#7b2fff',
];

function fallbackColor(username) {
  let hash = 0;
  for (const c of username) hash = (hash * 31 + c.charCodeAt(0)) & 0xffffffff;
  return FALLBACKS[Math.abs(hash) % FALLBACKS.length];
}

function escHtml(s) {
  return String(s ?? '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Third-party emote map: name → image url (BTTV + 7TV)
const tpEmotes = {};

async function loadThirdPartyEmotes(channelId) {
  // BTTV global
  try {
    const data = await fetch('https://api.betterttv.net/3/cached/emotes/global').then(r => r.json());
    for (const e of data) tpEmotes[e.code] = `https://cdn.betterttv.net/emote/${e.id}/1x`;
  } catch {}

  // 7TV global
  try {
    const data = await fetch('https://7tv.io/v3/emote-sets/global').then(r => r.json());
    for (const e of (data.emotes || [])) {
      const url = e.data?.host?.url;
      if (url) tpEmotes[e.name] = `https:${url}/1x.webp`;
    }
  } catch {}

  if (!channelId) return;

  // BTTV channel
  try {
    const data = await fetch(`https://api.betterttv.net/3/cached/users/twitch/${channelId}`).then(r => r.json());
    for (const e of [...(data.channelEmotes || []), ...(data.sharedEmotes || [])]) {
      tpEmotes[e.code] = `https://cdn.betterttv.net/emote/${e.id}/1x`;
    }
  } catch {}

  // 7TV channel
  try {
    const data = await fetch(`https://7tv.io/v3/users/twitch/${channelId}`).then(r => r.json());
    for (const e of (data.emote_set?.emotes || [])) {
      const url = e.data?.host?.url;
      if (url) tpEmotes[e.name] = `https:${url}/1x.webp`;
    }
  } catch {}
}

function renderEmotes(message, twitchEmotes) {
  // Build position map: start → {end, html} for all emote replacements
  const byPos = new Map();

  // Twitch native emotes (come with exact char positions)
  if (twitchEmotes) {
    for (const [id, ranges] of Object.entries(twitchEmotes)) {
      for (const range of ranges) {
        const [s, e] = range.split('-').map(Number);
        const text = message.slice(s, e + 1);
        byPos.set(s, { end: e, html: `<img src="https://static-cdn.jtvnw.net/emoticons/v2/${id}/default/dark/1.0" alt="${escHtml(text)}" title="${escHtml(text)}">` });
      }
    }
  }

  // Covered positions (don't let third-party emotes overlap Twitch ones)
  const covered = new Set();
  for (const [s, { end: e }] of byPos) for (let i = s; i <= e; i++) covered.add(i);

  // Third-party emotes: scan each word in message
  const wordRe = /\S+/g;
  let m;
  while ((m = wordRe.exec(message)) !== null) {
    const s = m.index, e = s + m[0].length - 1;
    if (covered.has(s)) continue;
    const url = tpEmotes[m[0]];
    if (url) byPos.set(s, { end: e, html: `<img src="${url}" alt="${escHtml(m[0])}" title="${escHtml(m[0])}">` });
  }

  // Apply replacements right-to-left so positions stay valid
  const sorted = [...byPos.entries()].sort((a, b) => b[0] - a[0]);
  let result = message;
  for (const [s, { end: e, html }] of sorted) {
    result = result.slice(0, s) + html + result.slice(e + 1);
  }

  // Escape any remaining plain text
  return result.replace(/(?<![>])[^<>]+(?=[<]|$)/g, chunk => escHtml(chunk));
}

function parseTags(raw) {
  const tags = {};
  for (const part of raw.split(';')) {
    const eq = part.indexOf('=');
    if (eq === -1) continue;
    const k = part.slice(0, eq), v = part.slice(eq + 1);
    tags[k] = v;
  }
  // Parse badges into object
  if (tags.badges) {
    const b = {};
    for (const pair of tags.badges.split(',')) {
      const [name, ver] = pair.split('/');
      if (name) b[name] = ver;
    }
    tags.badges = b;
  } else {
    tags.badges = {};
  }
  // Parse emotes into tmi-style object
  if (tags.emotes && tags.emotes !== '') {
    const e = {};
    for (const part of tags.emotes.split('/')) {
      const [id, ranges] = part.split(':');
      if (id && ranges) e[id] = ranges.split(',');
    }
    tags.emotes = e;
  } else {
    tags.emotes = null;
  }
  return tags;
}

const BADGE_LABELS = {
  broadcaster:    'I AM LIVE',
  moderator:      'MOD',
  lead_moderator: 'mon amour',
  vip:            'VIP',
  subscriber:     'SUB',
};
const BADGE_ORDER = ['broadcaster', 'lead_moderator', 'moderator', 'vip', 'subscriber'];

function buildBadges(badges, username) {
  const parts = BADGE_ORDER
    .filter(k => badges[k] !== undefined)
    .map(k => `<span class="badge badge-${k}">${BADGE_LABELS[k] ?? k}</span>`);

  const custom = CUSTOM_TITLES[(username || '').toLowerCase()];
  if (custom) {
    parts.push(`<span class="badge" style="color:${custom.color || '#bf00ff'};border-color:${custom.color || '#bf00ff'}">${custom.label}</span>`);
  }

  return parts.join('');
}

function addMessage(tags, message) {
  const chat  = document.getElementById('chat');
  const color = tags.color || fallbackColor(tags['display-name'] || 'user');

  const el = document.createElement('div');
  el.className = 'msg';
  el.style.setProperty('--user-color', color);

  const username  = tags['display-name'] || 'user';
  const badgeHtml = buildBadges(tags.badges, username);
  const textHtml  = renderEmotes(message, tags.emotes);

  el.innerHTML = `
    ${badgeHtml ? `<span class="badges">${badgeHtml}</span>` : ''}
    <span class="name">${escHtml(username)}</span>
    <span class="colon">:</span>
    <span class="text">${textHtml}</span>
  `;

  chat.appendChild(el);

  const msgs = chat.querySelectorAll('.msg');
  if (msgs.length > MAX_MESSAGES) {
    const oldest = msgs[0];
    oldest.classList.add('fade-out');
    oldest.addEventListener('animationend', () => oldest.remove(), { once: true });
  }
}

// ── Twitch IRC over WebSocket (no external library) ───────────────
async function getChannel() {
  const params = new URLSearchParams(window.location.search);
  if (params.get('channel')) return params.get('channel');
  try {
    const res  = await fetch('/status');
    const data = await res.json();
    return data.channel || null;
  } catch {
    return null;
  }
}

async function connect() {
  const channel = await getChannel();
  if (!channel) { console.error('No channel configured.'); return; }

  // Load custom titles + BTTV/7TV emotes (fire and forget)
  try { CUSTOM_TITLES = await fetch('/titles').then(r => r.json()); } catch {}
  try {
    const status = await fetch('/status').then(r => r.json());
    loadThirdPartyEmotes(status.broadcaster_id || null);
  } catch { loadThirdPartyEmotes(null); }

  const dot = document.getElementById('status-dot');
  const ws  = new WebSocket('wss://irc-ws.chat.twitch.tv');

  ws.onopen = () => {
    ws.send('CAP REQ :twitch.tv/tags twitch.tv/commands');
    ws.send('PASS SCHMOOPIIE');
    ws.send('NICK justinfan' + Math.floor(Math.random() * 99999));
    ws.send('JOIN #' + channel);
  };

  ws.onmessage = (e) => {
    for (const line of e.data.split('\r\n')) {
      if (line.startsWith('PING')) { ws.send('PONG :tmi.twitch.tv'); continue; }

      // @tags :user!user@... PRIVMSG #channel :message
      const match = line.match(/^@(\S+) :\S+ PRIVMSG #\S+ :(.*)$/);
      if (!match) continue;

      const tags    = parseTags(match[1]);
      const message = match[2];
      addMessage(tags, message);
    }
  };

  ws.onclose = () => {
    dot.classList.remove('live');
    setTimeout(connect, 5000);
  };

  ws.onerror = () => ws.close();

  // Mark connected once we get the JOIN confirmation
  const origOnMessage = ws.onmessage;
  ws.addEventListener('message', (e) => {
    if (e.data.includes('JOIN #' + channel)) dot.classList.add('live');
  });
}

connect();
</script>
</body>
</html>
